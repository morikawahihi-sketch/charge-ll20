<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChargeSPOT LL-20 診断アプリ</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <header class="app-header">
    <div>
      <h1>ChargeSPOT LL-20 診断</h1>
      <p>LED不点灯・温度記録・報告書・見積</p>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-target="diagnosis">診断</button>
    <button class="tab" data-target="photo">写真</button>
    <button class="tab" data-target="temp">温度</button>
    <button class="tab" data-target="report">報告書</button>
    <button class="tab" data-target="estimate">見積</button>
  </nav>

  <main>
    <section id="diagnosis" class="panel active">
      <h2>LED不点灯 診断フロー</h2>
      <div class="card">
        <div id="question" class="question"></div>
        <div id="diagnosisButtons"></div>
      </div>
      <div class="warning">※ AC100V測定は感電注意。通電測定は知識のある人が行ってください。</div>
    </section>

    <section id="photo" class="panel">
      <h2>写真記録</h2>
      <div class="card">
        <label class="file-label">
          写真を撮影・選択
          <input id="photoInput" type="file" accept="image/*" capture="environment" />
        </label>
        <img id="preview" alt="選択した写真" />
        <textarea id="photoMemo" placeholder="写真メモ：例 LED昇圧基板、R8/R9焼損、コネクタ抜けなど"></textarea>
      </div>
    </section>

    <section id="temp" class="panel">
      <h2>温度記録</h2>
      <div class="card grid">
        <label>外気温 ℃<input id="tOutside" type="number" step="0.1"></label>
        <label>ケース下部 ℃<input id="tBottom" type="number" step="0.1"></label>
        <label>ケース上部 ℃<input id="tTop" type="number" step="0.1"></label>
        <label>MOSFET ℃<input id="tMosfet" type="number" step="0.1"></label>
        <label>昇圧インダクタ ℃<input id="tInductor" type="number" step="0.1"></label>
        <label>電解コンデンサ ℃<input id="tCap" type="number" step="0.1"></label>
      </div>
      <button class="primary" id="tempJudgeBtn">温度判定</button>
      <div id="tempResult" class="result"></div>
    </section>

    <section id="report" class="panel">
      <h2>修理報告書</h2>
      <div class="card grid">
        <label>設置先<input id="siteName" type="text"></label>
        <label>機番<input id="machineNo" type="text"></label>
        <label>作業者<input id="worker" type="text"></label>
        <label>作業日<input id="workDate" type="date"></label>
      </div>
      <textarea id="workContent" placeholder="作業内容：例 LED昇圧基板入力電圧確認、出力なし、GND再固定、基板交換"></textarea>
      <button class="primary" id="makeReportBtn">報告書を作成</button>
      <textarea id="reportOutput" readonly></textarea>
    </section>

    <section id="estimate" class="panel">
      <h2>見積作成</h2>
      <div class="card grid">
        <label>LED昇圧基板交換 数量<input id="qtyBoost" type="number" value="0"></label>
        <label>LEDバー交換 数量<input id="qtyLed" type="number" value="0"></label>
        <label>配線修復 数量<input id="qtyWire" type="number" value="0"></label>
        <label>点検・診断 数量<input id="qtyCheck" type="number" value="1"></label>
      </div>
      <button class="primary" id="calcEstimateBtn">見積計算</button>
      <div id="estimateResult" class="result"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
