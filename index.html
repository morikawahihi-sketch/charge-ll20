<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ChargeSPOT LL-20 診断アプリ Ver.1.0</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="app-header">
  <div>
    <h1>ChargeSPOT LL-20 診断アプリ</h1>
    <p>LED・モニター・電源・温度・報告書・見積</p>
  </div>
  <button id="homeBtn" class="ghost">ホーム</button>
</header>

<main>
  <section id="home" class="screen active">
    <h2>ホーム画面：故障項目選択</h2>
    <div class="grid">
      <button class="tile" data-open="led">💡 LED点灯しない</button>
      <button class="tile" data-open="led">💡 LED点灯しない（部分的）</button>
      <button class="tile" data-open="monitor">🖥 モニター画像が乱れる</button>
      <button class="tile" data-open="monitor">🖥 モニター画像が映らない</button>
      <button class="tile" data-open="power">📦 スロット・カセットを取り出せない</button>
      <button class="tile" data-open="power">📦 スロット・カセットを戻しても認識しない</button>
      <button class="tile" data-open="power">🔋 充電できない</button>
      <button class="tile" data-open="power">📡 通信異常</button>
      <button class="tile" data-open="power">🔁 再起動を繰り返す</button>
      <button class="tile" data-open="power">⚡ ブレーカーが落ちる</button>
    </div>
    <div class="notice">通電測定・AC100V測定は感電注意。十分な知識のある方が安全を確保して行ってください。</div>
  </section>

  <section id="led" class="screen"><h2>LED不点灯診断フローチャート</h2><div id="ledFlow" class="flow"></div></section>
  <section id="monitor" class="screen"><h2>モニター不点灯診断</h2><div id="monitorFlow" class="flow"></div></section>
  <section id="power" class="screen"><h2>電源異常診断</h2><div id="powerFlow" class="flow"></div></section>

  <section id="photo" class="screen">
    <h2>写真撮影・保存</h2>
    <input id="photoInput" type="file" accept="image/*" capture="environment" multiple />
    <p class="hint">撮影した写真はこのブラウザ内に保存されます。</p>
    <div id="photoList" class="photos"></div>
    <button id="clearPhotos" class="danger">写真を全削除</button>
  </section>

  <section id="temp" class="screen">
    <h2>温度測定記録</h2>
    <div class="form">
      <input id="tempPoint" placeholder="測定箇所 例：MOSFET / インダクタ / LED上部">
      <input id="tempValue" type="number" step="0.1" placeholder="温度 ℃">
      <textarea id="tempMemo" placeholder="メモ 例：カバーあり、30分通電後"></textarea>
      <button id="addTemp">温度を記録</button>
    </div>
    <table><thead><tr><th>時刻</th><th>箇所</th><th>℃</th><th>判定</th><th>メモ</th></tr></thead><tbody id="tempRows"></tbody></table>
    <button id="clearTemps" class="danger">温度記録を全削除</button>
  </section>

  <section id="report" class="screen">
    <h2>修理報告書</h2>
    <div class="form">
      <input id="rDate" type="date">
      <input id="rWorker" placeholder="作業者名">
      <input id="rSerial" placeholder="機器番号・管理番号">
      <input id="rPlace" placeholder="設置場所">
      <select id="rTrouble"><option>LED点灯しない</option><option>モニター不点灯</option><option>電源異常</option><option>再起動する</option><option>その他</option></select>
      <textarea id="rCause" placeholder="原因・診断結果"></textarea>
      <textarea id="rWork" placeholder="修理内容"></textarea>
      <textarea id="rParts" placeholder="交換部品"></textarea>
      <textarea id="rMemo" placeholder="備考"></textarea>
      <button id="makeReport">報告書を作成</button>
      <button id="printReport">PDF保存/印刷</button>
    </div>
    <div id="reportPreview" class="paper"></div>
  </section>

  <section id="estimate" class="screen">
    <h2>見積書作成</h2>
    <div class="form row">
      <input id="eItem" placeholder="作業・部品名">
      <input id="eQty" type="number" value="1" placeholder="数量">
      <input id="ePrice" type="number" placeholder="単価">
      <button id="addEstimate">追加</button>
    </div>
    <table><thead><tr><th>内容</th><th>数量</th><th>単価</th><th>金額</th></tr></thead><tbody id="estimateRows"></tbody></table>
    <h3 id="estimateTotal">合計：0円</h3>
    <button id="clearEstimate" class="danger">見積を全削除</button>
  </section>

  <section id="ai" class="screen">
    <h2>AI故障原因推定</h2>
    <div class="checklist">
      <label><input type="checkbox" value="AC100Vなし"> AC100Vが無い</label>
      <label><input type="checkbox" value="DC12V/24Vなし"> DC12V/24Vが無い</label>
      <label><input type="checkbox" value="LED昇圧基板入力あり出力なし"> LED昇圧基板に入力あり・出力なし</label>
      <label><input type="checkbox" value="LEDバー単体不点灯"> LEDバー単体が点灯しない</label>
      <label><input type="checkbox" value="GNDアース不良"> GND/アースが怪しい</label>
      <label><input type="checkbox" value="MOSFET高温"> MOSFETが70℃以上</label>
      <label><input type="checkbox" value="インダクタ高温"> インダクタが80℃以上</label>
      <label><input type="checkbox" value="電解コンデンサ劣化"> 電解コンデンサ膨張・ESR高い</label>
      <label><input type="checkbox" value="BL_EN/PWMなし"> BL_EN/PWM信号が無い</label>
      <label><input type="checkbox" value="配線コネクタ接触不良"> コネクタ・配線接触不良</label>
    </div>
    <button id="runAi">推定する</button>
    <div id="aiResult" class="result"></div>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
